# my window manager config ;)
set -sg escape-time 0
unbind C-b
#unbind C-a
set -g prefix C-a
bind -r y setw synchronize-panes
set -g renumber-windows on
# form vim/tmux d/y buffer sync
set -g focus-events
#bind-key C-a last-window
unbind =
bind = split-window -h -c "#{pane_current_path}"
unbind -
bind - split-window -v -c "#{pane_current_path}"


# vi for copy mode
setw -g mode-keys vi

# vi for command status
set -g status-keys vi

# vi keys to resize
bind -r C-k resize-pane -U 1
bind -r C-j resize-pane -D 1
bind -r C-h resize-pane -L 1
bind -r C-l resize-pane -R 1

# vi keys to select panes
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind f run-shell "tmux new ~/Scripts/tmux-session-dispensary.sh"
bind E show-environment -g

# avoid cursor movement messing with gesize
set -g repeat-time 200

# Improve terminal colors
set -a terminal-features "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

set -g clock-mode-style 12
#setw -g clock-mode-colour "color0"
set -g base-index 1
setw -g pane-base-index 1

# --- colors ---
set -g status on
set -g status-interval 1
set -g status-position top
set -g status-justify centre

# background / foreground
set -g status-style "bg=colour236,fg=colour120"

# window list (middle)
set -g window-status-separator "#[fg=colour23] | "
set -g window-status-format "#[fg=colour244]#I:#W"
set -g window-status-current-format "#[fg=colour212,bold]#I:#W"

# left side (host)
set -g status-left "#[fg=colour3,bold]#[bg=colour23] #H #[bg=colour23]#[fg=colour81]| %Y-%m-%d |"
set -g status-left-length 29

# right side (time + load)
set -g status-right "#[bg=colour23]|#[fg=colour120]#(uptime | cut -d ',' -f1) |"
set -g status-right-length 22

# pane borders
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour120"
set -g pane-border-status bottom
set -g pane-border-format "#[fg=colour244]#P #[fg=colour120]#{pane_current_command} #[fg=colour244]\
| #[fg=colour81]#{pane_current_path}#[fg=colour226] L:#(cut -d ' ' -f1-3 /proc/loadavg) "

# message styling
set -g message-style "bg=colour234,fg=colour196"
set -g message-command-style "bg=colour234,fg=colour81"

# reload config
bind -r r source-file ~/.tmux.conf

set -g status on
set -g status-interval 1

set -g automatic-rename
