# my window manager config ;)
set -sg escape-time 0
unbind C-b
#unbind C-a
set -g prefix C-a
bind -r y setw synchronize-panes
set -g renumber-windows on
# form vim/tmux d/y buffer sync
set -g focus-events
#bind-key C-a last-window
unbind =
bind = split-window -h -c "#{pane_current_path}"
unbind - 
bind - split-window -v -c "#{pane_current_path}"


# vi for copy mode
setw -g mode-keys vi

# vi for command status
set -g status-keys vi

# vi keys to resize
bind -r C-k resize-pane -U 1
bind -r C-j resize-pane -D 1
bind -r C-h resize-pane -L 1
bind -r C-l resize-pane -R 1

# vi keys to select panes
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind f run-shell "tmux new ~/Scripts/tmux-session-dispensary.sh"
bind E show-environment -g

# avoid cursor movement messing with gesize
set -g repeat-time 200

# Improve terminal colors
set -a terminal-features "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

set -g clock-mode-style 12
#setw -g clock-mode-colour "color0"
set -g base-index 1
setw -g pane-base-index 1

#set -g pane-border-style  "fg=color244"
#set -g pane-active-border-style "fg=color208"

# --- colors ---
set -g status on
set -g status-interval 1
set -g status-position top

# background / foreground
set -g status-style "bg=colour0,fg=colour120"

# window list (middle)
set -g window-status-separator ""
set -g window-status-format ""
set -g window-status-current-format ""
# left side (host)
set -g status-left "#[fg=colour3,bold]#[bg=colour23] #H #[bg=colour23]#[fg=colour81]| %Y-%m-%d | #[fg=colour120]#(uptime | cut -d ',' -f1) \
| #[fg=colour226]L:#(cut -d ' ' -f1-3 /proc/loadavg) #[bg=colour23]#[fg=colour210,bold] | #I:#W "
set -g status-left-length 100

# right side (time + load)
#set -g status-right "#[fg=colour3]#[bg=colour0] %Y-%m-%d #[fg=colour226]#(uptime | cut -d ',' -f 1)\
# #[fg=colour16]#[bg=colour226]L:#(cut -d ' ' -f1 /proc/loadavg)"
set -g status-right ""

# pane borders
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour120"

# message styling
set -g message-style "bg=colour234,fg=colour196"
set -g message-command-style "bg=colour234,fg=colour81"

setw -g window-status-current-style 'fg=color10 bg=default bold'
setw -g window-status-style 'fg=color242 bg=default'

#setw -g window-status-style 'fg=color249'

# reload config
bind -r r source-file ~/.tmux.conf

set -g status on
set -g status-interval 1

set -g automatic-rename
